<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة تصحيح النطق واللغة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1219;
            --card-bg: #1a1f2b;
            --primary: #36bdfc;
            --primary-glow: rgba(54, 189, 252, 0.3);
            --text-main: #ffffff;
            --text-muted: #8b92a5;
            --accent-yellow: #FFD700;
            --accent-red: #ff4d4d;
            --accent-green: #4ade80;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 1.5rem;
            font-weight: 800;
        }

        /* API Settings */
        .api-settings {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px dashed var(--text-muted);
        }

        .api-settings input {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-color);
            border: 1px solid var(--primary);
            color: var(--text-main);
            border-radius: 8px;
            margin-top: 0.5rem;
            outline: none;
            text-align: left;
            direction: ltr;
        }

        .api-settings button {
            margin-top: 1rem;
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .api-settings button:hover {
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Mic Section */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 3px solid var(--primary);
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .mic-btn svg {
            width: 35px;
            height: 35px;
            fill: currentColor;
        }

        .mic-btn.recording {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: #fff;
            animation: pulse-red 1.5s infinite;
        }

        .status-text {
            color: var(--text-muted);
            font-size: 1.1rem;
            text-align: center;
        }

        /* Live Transcript Section */
        .live-transcript {
            width: 100%;
            min-height: 50px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 2rem;
            direction: ltr;
            text-align: left;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.2rem;
            color: var(--primary);
            display: none;
        }

        .live-transcript span.interim {
            color: var(--text-muted);
        }

        /* Results Section */
        .result-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 12px;
            min-height: 150px;
            display: none;
            direction: ltr;
            text-align: left;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.2rem;
            line-height: 1.8;
            animation: slideUp 0.5s ease-out;
            position: relative;
        }

        .loading {
            text-align: center;
            color: var(--primary);
            display: none;
            margin: 1rem 0;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        .word-important {
            color: var(--accent-yellow);
            font-weight: bold;
        }

        .word-wrong {
            color: var(--accent-red);
            text-decoration: line-through;
        }

        .corrections-section {
            margin-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 1.5rem;
        }

        .correction-item {
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .correction-correct {
            color: var(--accent-red);
            font-weight: bold;
        }

        /* Audio Button */
        .audio-btn {
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            transition: all 0.3s;
        }

        .audio-btn:hover {
            box-shadow: 0 0 10px var(--primary-glow);
            transform: translateY(-2px);
        }

        .audio-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Animations */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(255, 77, 77, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 600px) {
            .container { padding: 1.5rem; }
            .mic-btn { width: 70px; height: 70px; }
            .result-box, .live-transcript { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>مصحح النطق الإنجليزي</h1>

        <div class="api-settings" id="apiSection">
            <label for="apiKey">أدخل مفتاح OpenRouter API للبدء (يُحفظ في متصفحك فقط):</label>
            <input type="password" id="apiKey" placeholder="sk-or-v1-...">
            <button type="button" onclick="saveApiKey()">حفظ وبدء الاستخدام</button>
        </div>

        <div class="controls" id="controlsSection" style="display: none;">
            <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
                <svg viewBox="0 0 24 24" id="micIcon">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
            <div class="status-text" id="statusText">اضغط على الميكروفون لبدء التحدث</div>
        </div>

        <div class="live-transcript" id="liveTranscript"></div>

        <div class="loading" id="loading">جاري إرسال النص للتحليل...</div>
        <div class="result-box" id="resultBox"></div>
    </div>

    <script>
        // Check API Key
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('openrouter_api_key');
            if (savedKey) {
                document.getElementById('apiSection').style.display = 'none';
                document.getElementById('controlsSection').style.display = 'flex';
            }
        });

        function saveApiKey() {
            const key = document.getElementById('apiKey').value.trim();
            if (key) {
                localStorage.setItem('openrouter_api_key', key);
                document.getElementById('apiSection').style.display = 'none';
                document.getElementById('controlsSection').style.display = 'flex';
            }
        }

        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("متصفحك لا يدعم ميزة التعرف على الصوت. يرجى استخدام Google Chrome.");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = true; 
        recognition.interimResults = true; // تفعيل عرض النص الحي أثناء النطق

        let isRecording = false;
        let finalTranscript = ''; 
        
        const micBtn = document.getElementById('micBtn');
        const statusText = document.getElementById('statusText');
        const resultBox = document.getElementById('resultBox');
        const loading = document.getElementById('loading');
        const liveTranscriptBox = document.getElementById('liveTranscript');
        let currentAudioText = '';

        function toggleRecording() {
            if (isRecording) {
                // Stop manually
                recognition.stop();
                micBtn.classList.remove('recording');
                statusText.innerText = "تم الإيقاف. جاري تجهيز النص للتحليل...";
                isRecording = false;
            } else {
                // Start recording
                finalTranscript = '';
                liveTranscriptBox.innerHTML = '';
                recognition.start();
                micBtn.classList.add('recording');
                statusText.innerHTML = "جاري الاستماع... (اضغط مجدداً للتحليل)";
                isRecording = true;
                resultBox.style.display = 'none';
                liveTranscriptBox.style.display = 'block';
                
                window.speechSynthesis.cancel();
            }
        }

        // تحديث النص الحي لحظة بلحظة
        recognition.onresult = function(event) {
            let interimTranscript = '';
            
            // قراءة النتائج الحية والنهائية
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript + ' ';
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }
            
            // عرض النص المكتمل + النص الجاري النطق به حالياً بلون خافت
            liveTranscriptBox.innerHTML = finalTranscript + '<span class="interim">' + interimTranscript + '</span>';
        };

        recognition.onend = function() {
            if (isRecording) {
                isRecording = false;
                micBtn.classList.remove('recording');
            }
            
            if (finalTranscript.trim() !== '') {
                analyzeWithOpenRouter(finalTranscript);
                finalTranscript = '';
            } else {
                statusText.innerText = "لم يتم التقاط أي صوت. اضغط للتحدث مجدداً.";
                liveTranscriptBox.style.display = 'none';
            }
        };

        recognition.onerror = function(event) {
            isRecording = false;
            micBtn.classList.remove('recording');
            statusText.innerText = "حدث خطأ في الميكروفون: " + event.error;
        };

        // الاتصال بـ OpenRouter
        async function analyzeWithOpenRouter(text) {
            loading.style.display = 'block';
            statusText.innerText = "اضغط على الميكروفون للتحدث مجدداً";
            const apiKey = localStorage.getItem('openrouter_api_key');

            const prompt = `
            You are an expert English pronunciation and grammar coach. 
            Analyze the following transcribed text from a user practicing English.
            Text: "${text}"
            
            Return ONLY a valid JSON object (no markdown, no backticks) with this structure:
            {
                "html_text": "The original text but formatted. Wrap any strong/important vocabulary words in <span class='word-important'>word</span>. Wrap any grammatically incorrect or badly pronounced words in <span class='word-wrong'>word</span>. Leave correct normal words as they are.",
                "corrections": [
                    { "wrong": "the incorrect word", "correct": "the correct word" }
                ],
                "correct_full_text": "The completely corrected version of the user's text in plain English punctuation (used for text-to-speech)."
            }
            `;

            try {
                // استخدام رابط OpenRouter
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        // يمكنك تغيير النموذج هنا إذا أردت، استخدمت gemini من خلال openrouter
                        "model": "google/gemini-2.5-flash", 
                        "messages": [
                            { "role": "user", "content": prompt }
                        ]
                    })
                });

                const data = await response.json();
                loading.style.display = 'none';

                if (data.error) {
                    alert("خطأ من OpenRouter: " + data.error.message);
                    return;
                }

                // جلب الرد من هيكل OpenRouter
                let jsonStr = data.choices[0].message.content;
                jsonStr = jsonStr.split('```json').join('').split('```').join('').trim();
                
                const result = JSON.parse(jsonStr);
                renderResults(result);

            } catch (error) {
                loading.style.display = 'none';
                alert("حدث خطأ أثناء الاتصال بـ OpenRouter أو في تحليل البيانات.");
                console.error(error);
            }
        }

        function renderResults(data) {
            resultBox.style.display = 'block';
            currentAudioText = data.correct_full_text;
            
            let htmlContent = `<div>${data.html_text}</div>`;
            
            if (data.corrections && data.corrections.length > 0) {
                htmlContent += `<div class="corrections-section">
                    <h3 style="color: var(--primary); margin-bottom: 10px; font-family: 'Cairo', sans-serif;" dir="rtl">التصحيحات:</h3>
                    <ul>`;
                
                data.corrections.forEach(item => {
                    htmlContent += `
                        <li class="correction-item">
                            <span style="text-decoration: line-through; color: #8b92a5;">${item.wrong}</span> 
                            ➔ <span class="correction-correct">${item.correct}</span>
                        </li>`;
                });
                
                htmlContent += `</ul></div>`;
            } else {
                htmlContent += `<div class="corrections-section"><p style="color: var(--accent-green); font-family: 'Cairo', sans-serif;" dir="rtl">نطق رائع وممتاز! لا توجد أخطاء واضحة.</p></div>`;
            }

            htmlContent += `
                <button class="audio-btn" onclick="playCorrectAudio()" title="استمع للنطق الصحيح">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    استمع للنطق الصحيح
                </button>
            `;

            resultBox.innerHTML = htmlContent;
        }

        function playCorrectAudio() {
            if (!currentAudioText) return;
            
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(currentAudioText);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.9; 
            utterance.pitch = 1;
            
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
